name: 🛠️ Build AYON launcher

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name'
        required: true
        type: string

jobs:
  build-linux:
    name: Build (${{ matrix.variant }}${{ matrix.use-pyside2 && ' - PySide 2' || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: ubuntu
          - variant: debian
          - variant: rocky8
          - variant: rocky8
            use-pyside2: true
          - variant: rocky9

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}
          submodules: recursive

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run Docker Build
        shell: bash
        run: |
          chmod +x ./tools/make.sh
          ./tools/make.sh docker-build ${{ matrix.variant }} ${{ matrix.use-pyside2 == true && '--use-pyside2' || '' }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build_${{ matrix.variant }}${{ matrix.use-pyside2 && '_pyside2' || '' }}/installer/*
          tag_name: ${{ inputs.tag_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create Environment
        run: |
          powershell -File ./tools/manage.ps1 create-env

      - name: Install Runtime Dependencies
        run: |
          powershell -File ./tools/manage.ps1 install-runtime

      - name: Build and Make Installer
        run: |
          powershell -File ./tools/manage.ps1 build-make-installer

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/installer/*
          tag_name: ${{ inputs.tag_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}
          submodules: recursive

      - name: Install Homebrew dependencies
        run: brew install cmake create-dmg

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}

      - name: Set up notarization keychain profile
        env:
          APPLE_NOTARIZE_APPLE_ID: ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
          APPLE_NOTARIZE_TEAM_ID: ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "ayon-ci" \
            --apple-id "$APPLE_NOTARIZE_APPLE_ID" \
            --password "$APPLE_NOTARIZE_PASSWORD" \
            --team-id "$APPLE_NOTARIZE_TEAM_ID"

      - name: Create environment
        run: |
          chmod +x ./tools/make.sh
          ./tools/make.sh create-env

      - name: Install runtime dependencies
        run: ./tools/make.sh install-runtime

      - name: Build and make installer
        env:
          AYON_APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          AYON_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AYON_APPLE_NOTARIZE: "1"
          AYON_APPLE_NOTARIZE_KEYCHAIN_PROFILE: "ayon-ci"
        run: ./tools/make.sh build-make-installer

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/installer/*
          tag_name: ${{ inputs.tag_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
